frr version 10.6
frr defaults traditional
hostname r3
no ipv6 forwarding
service integrated-vtysh-config
!
! r3 is transit-only: it carries the backup path r1 <-> r3 <-> r2 and has no
! host subnet of its own. When the direct r1<->r2 link fails, OSPF pulls the
! inter-site traffic through here.
!
interface eth1
 description to-r1 BACKUP (transit 10.0.1.0/30)
 ip address 10.0.1.2/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf cost 10
 ip ospf hello-interval 2
 ip ospf dead-interval 8
!
interface eth2
 description to-r2 BACKUP (transit 10.0.2.0/30)
 ip address 10.0.2.1/30
 ip ospf area 0
 ip ospf network point-to-point
 ip ospf cost 10
 ip ospf hello-interval 2
 ip ospf dead-interval 8
!
router ospf
 ospf router-id 3.3.3.3
!
line vty
!
