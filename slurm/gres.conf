# gres.conf — maps the "gpu" GRES declared in slurm.conf to the physical
# NVIDIA device node on QuarkyLab.
#
# Update Type= and add a second Name=gpu line after the RTX 8000 swap if
# QuarkyLab ever runs two cards simultaneously; for now it's one card, one
# line.

NodeName=quarkylab Name=gpu Type=rtx6000 File=/dev/nvidia0
