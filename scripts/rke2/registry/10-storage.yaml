# Registry storage: namespace + node-local PV on Randy's datastore ZFS + PVC.
# Prereq (once, on Randy):  mkdir -p /datastore/k8s-local/registry
# Rationale: pod is pinned to Randy; the nfs-client SC can't serve a Randy-local
# pod (loopback self-mount -> access denied), so we use a static node-local PV.
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: registry-randy-local
spec:
  capacity:
    storage: 10Gi
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""            # static bind, opt out of any StorageClass
  volumeMode: Filesystem
  local:
    path: /datastore/k8s-local/registry
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["randy"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ""            # must match the PV -> static bind, no dynamic provisioning
  resources:
    requests:
      storage: 10Gi
  volumeName: registry-randy-local
