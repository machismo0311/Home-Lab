# Private OCI registry on Randy, registry-native TLS, exposed via MetalLB.
# Requires (out-of-band, NOT in git):
#   - secret/registry-tls    (step-ca cert+key for registry.netframe.local) -- see README
#   - the storage from 10-storage.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels: { app: registry }
spec:
  replicas: 1
  strategy: { type: Recreate }        # single RWO local PV -> no two pods mounting at once
  selector:
    matchLabels: { app: registry }
  template:
    metadata:
      labels: { app: registry }
    spec:
      # Toleration for Randy's storage taint; the PV's nodeAffinity already pins to randy.
      tolerations:
        - key: node.netframe.io/role
          operator: Equal
          value: storage
          effect: NoSchedule
      containers:
        - name: registry
          image: registry:2.8.3
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            - name: REGISTRY_HTTP_ADDR
              value: ":5000"
            - name: REGISTRY_HTTP_TLS_CERTIFICATE
              value: /certs/tls.crt
            - name: REGISTRY_HTTP_TLS_KEY
              value: /certs/tls.key
          volumeMounts:
            - { name: data,  mountPath: /var/lib/registry }
            - { name: certs, mountPath: /certs, readOnly: true }
          readinessProbe:
            httpGet: { path: /v2/, port: 5000, scheme: HTTPS }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /v2/, port: 5000, scheme: HTTPS }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: certs
          secret:
            secretName: registry-tls
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
  annotations:
    metallb.universe.tf/loadBalancerIPs: 192.168.10.72
spec:
  type: LoadBalancer
  selector: { app: registry }
  ports:
    - name: https
      port: 443
      targetPort: 5000
