# slurm.conf — NetFRAME (QuarkyLab GPU scheduling)
#
# Single-node SLURM cluster on QuarkyLab, protecting Fernanda's research
# workload from ~15 physics students/semester who need shared GPU access.
# Two partitions on the same node, separated by priority + QoS rather than
# hardware, since there's currently one GPU to schedule against.

ClusterName=netframe
SlurmctldHost=quarkylab

# Auth / comms
AuthType=auth/munge
CryptoType=crypto/munge

# --- GPU scheduling ---------------------------------------------------
# GresTypes must be declared before any Gres= line references it.
GresTypes=gpu

# ConstrainDevices in cgroup.conf is what actually enforces this at the
# kernel level — GresTypes alone only tells the scheduler the resource
# exists, it doesn't stop a student job from seeing every GPU.
ProctrackType=proctrack/cgroup
TaskPlugin=task/cgroup

# --- Node definition ----------------------------------------------------
# Gres count reflects current hardware (1x RTX 6000 24GB). Update to
# QuarkyLab runs an RTX 8000 (48GB) since the 2026-07-01 swap.
NodeName=quarkylab CPUs=44 RealMemory=515000 Gres=gpu:rtx8000:1 State=UNKNOWN

# --- Partitions -----------------------------------------------------
# research: Fernanda's DUNE agent + coursework. No hard wall-time limit,
# higher scheduling priority — this workload should never be starved out
# by student jobs.
PartitionName=research Nodes=quarkylab Default=NO MaxTime=INFINITE \
    PriorityTier=100 State=UP AllowGroups=fernanda,netframe-admin

# students: capped wall-time and GPU-per-user, lower priority tier. A
# queued research job will preempt a running student job rather than
# wait behind it (see PreemptType below).
PartitionName=students Nodes=quarkylab Default=YES MaxTime=04:00:00 \
    PriorityTier=10 State=UP AllowGroups=students QOS=student

# Research jobs can preempt (requeue) student jobs on the same node
# instead of queueing behind them — this is the actual mechanism that
# "protects Fernanda's workload," not just partition priority alone.
PreemptType=preempt/partition_prio
PreemptMode=REQUEUE

# --- Logging ---------------------------------------------------------
SlurmctldDebug=info
SlurmdDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log
