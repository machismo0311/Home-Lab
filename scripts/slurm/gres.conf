# gres.conf — maps the "gpu" GRES declared in slurm.conf to the physical
# NVIDIA device node on QuarkyLab.
#
# QuarkyLab runs a single RTX 8000 (48GB) since the 2026-07-01 swap; one card,
# one line. Add a second Name=gpu line if it ever runs two cards simultaneously.

NodeName=quarkylab Name=gpu Type=rtx8000 File=/dev/nvidia0
