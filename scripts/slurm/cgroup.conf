# cgroup.conf — enforcement layer for GRES.
#
# ConstrainDevices=yes is the setting that makes GPU GRES actually mean
# something: without it, SLURM will schedule against the GPU count but
# every job — student or research — can still see and use every GPU
# device node regardless of what it was allocated. This is what makes
# "gpu:rtx6000:1" a real boundary instead of just a scheduling hint.

ConstrainCores=yes
ConstrainRAMSpace=yes
ConstrainDevices=yes
