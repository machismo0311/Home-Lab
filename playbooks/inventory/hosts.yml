---
# km-cluster static inventory
#
# IPs verified against Home-Lab/CLAUDE.md node tables on 2026-07-11.
# The 7 hosts below ARE the complete km-cluster. NOTE the following are
# deliberately NOT in this inventory:
#   - pve1     : standalone Mac Mini (Pi-hole primary .177), NOT a cluster member
#   - sandbox  : standalone lab EliteDesk (192.168.70.x), NOT in cluster
# (Grafana scrapes "8 targets" because it also watches the Mac Mini; the
#  hardening/cluster scope is these 7 nodes only.)
#
# Connection user is root on every host (confirmed 2026-07-11), set once as an
# all-group var below. (Note: interactive SSH to quarkylab from Ares uses the
# fernanda key, but Ansible connects as root here.)

all:
  vars:
    ansible_user: root
  children:
    proxmox_nodes:
      hosts:
        pve2:
          ansible_host: 192.168.10.204
          exclude_from_hardening: true   # OPNsense host — see spec Section 5; config stays MANUAL
        pve3:
          ansible_host: 192.168.10.201
        pve4:
          ansible_host: 192.168.10.202
        pve5:
          ansible_host: 192.168.10.203
        quarkylab:
          ansible_host: 192.168.10.179
        jarvis:
          ansible_host: 192.168.10.31
        randy:
          ansible_host: 192.168.10.187

    compute:
      hosts:
        quarkylab:
        jarvis:

    storage:
      hosts:
        randy:

    # monitoring_targets == the full 7-node cluster (proxmox_nodes).
    # The hardening play iterates this group but skips exclude_from_hardening hosts.
    monitoring_targets:
      children:
        proxmox_nodes:
