[defaults]
inventory       = inventory/hosts.yml
roles_path      = roles
host_key_checking = True
retry_files_enabled = False
# Vault password lives OUTSIDE the repo (password manager). Point at it at runtime:
#   ansible-playbook desired-state.yml --vault-password-file ~/.ansible-vault-pass
# or uncomment and set a path here:
# vault_password_file = ~/.ansible-vault-pass

[privilege_escalation]
become = True
become_method = sudo
