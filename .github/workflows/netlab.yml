name: netlab (virtual network)

on:
  push:
    paths:
      - "netlab/**"
      - ".github/workflows/netlab.yml"
  pull_request:
    paths:
      - "netlab/**"
      - ".github/workflows/netlab.yml"
  workflow_dispatch:

jobs:
  virtual-network:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install containerlab
        run: bash -c "$(curl -sL https://get.containerlab.dev)"

      - name: Deploy topology
        working-directory: netlab
        run: sudo containerlab deploy -t netframe-lab.clab.yml

      - name: Run reachability tests (steady state)
        run: sudo bash netlab/tests/test_reachability.sh

      - name: Run failover tests (kill primary link, prove OSPF reroutes)
        run: sudo bash netlab/tests/test_failover.sh

      - name: Diagnostics (on failure)
        if: failure()
        run: |
          for n in r1 r2 r3; do
            echo "### $n ip_forward + routes + OSPF neighbors"
            sudo docker exec clab-netframe-$n cat /proc/sys/net/ipv4/ip_forward || true
            sudo docker exec clab-netframe-$n vtysh -c 'show ip route' || true
            sudo docker exec clab-netframe-$n vtysh -c 'show ip ospf neighbor' || true
          done
          for h in h1 h2; do
            echo "### $h addr/route"
            sudo docker exec clab-netframe-$h ip -br addr || true
            sudo docker exec clab-netframe-$h ip route || true
          done
          echo "### r1 -> h2"; sudo docker exec clab-netframe-r1 ping -c2 -W2 10.10.2.10 || true
          echo "### r2 -> h1"; sudo docker exec clab-netframe-r2 ping -c2 -W2 10.10.1.10 || true

      - name: Destroy topology
        if: always()
        working-directory: netlab
        run: sudo containerlab destroy -t netframe-lab.clab.yml --cleanup
