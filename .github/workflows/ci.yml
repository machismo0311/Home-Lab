name: CI

# Lint/syntax checks for the Python services (llm_router, jarvis-oncall) and bash scripts.
# CI only — deployment to physical infra stays manual (SSH/systemd), per infra-safety policy.

# Deliberately NOT path-filtered. Both job names below ("Python lint + syntax" and
# "ShellCheck (bash)") are required status checks in main's branch protection, and a
# required check that never runs stays pending forever — a docs/vault-only PR was
# therefore unmergeable except via admin bypass. Running these on every PR costs a few
# seconds against an unchanged scripts/ and keeps the merge gate honest.
# diagram.yml and netlab.yml stay path-filtered: they are expensive and not required checks.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: pip install ruff==0.15.21
      - name: Ruff lint
        run: ruff check scripts/
      - name: Syntax check (py_compile)
        run: find scripts -name '*.py' -print0 | xargs -0 python -m py_compile

  shellcheck:
    name: ShellCheck (bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck (error severity blocks)
        run: |
          shellcheck --version
          find scripts -name '*.sh' -print0 | xargs -0 -r shellcheck --severity=error
