name: diagram-as-code

on:
  push:
    paths:
      - "topology/**"
      - ".github/workflows/diagram.yml"
  pull_request:
    paths:
      - "topology/**"
      - ".github/workflows/diagram.yml"
  workflow_dispatch:

jobs:
  check-diagram:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install deps
        run: pip install pyyaml

      - name: Verify topology.mmd matches inventory.yml
        run: python3 topology/gen_diagram.py --check
